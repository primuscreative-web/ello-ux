<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#071319" />
    <title>ELLO offline</title>
    <style>
      :root {
        color: #f4fbfb;
        background: #071319;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 20% 10%, rgba(16, 184, 170, 0.36), transparent 22rem),
          linear-gradient(145deg, #071319, #063f3f);
      }

      main {
        width: min(88vw, 30rem);
        border: 1px solid rgba(131, 255, 243, 0.18);
        border-radius: 2rem;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 30px 100px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(22px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 8vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 1rem 0 0;
        color: rgba(244, 251, 251, 0.72);
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        min-height: 3rem;
        align-items: center;
        margin-top: 1.5rem;
        border-radius: 1rem;
        background: #10b8aa;
        color: white;
        font-weight: 800;
        padding: 0 1.2rem;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ELLO</h1>
      <p>Voce esta sem conexao agora. Assim que a internet voltar, seus pedidos, conversas e profissionais carregam novamente.</p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
