services:
  - type: web
    name: ello-api
    runtime: node
    rootDir: ello-backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ELLO_STORE_DRIVER
        value: supabase
      - key: ELLO_ALLOWED_ORIGINS
        sync: false
      - key: ELLO_SESSION_TTL_MS
        value: 2592000000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
